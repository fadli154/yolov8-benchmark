name: waste_detection
description: "Smart Waste Detector - YOLOv8 TFLite Android Benchmark"
publish_to: 'none'
version: 0.2.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # State management & DI
  get: ^4.6.6
  get_storage: ^2.1.1

  # Camera & Detection
  flutter_vision:
    path: packages/flutter_vision
  camera: ^0.11.4

  # TTS
  flutter_tts: ^4.0.2

  # UI / Fonts
  google_fonts: ^6.1.0
  fl_chart: ^0.69.0

  # Permissions
  permission_handler: ^11.0.0

  # Export
  pdf: ^3.10.8
  printing: ^5.13.1
  csv: ^6.0.0
  share_plus: ^10.0.3
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/models/best_yolov8n.tflite
    - assets/models/best_yolov8s.tflite
    - assets/models/uang.tflite
    - assets/models/labels.txt
    - assets/icon/icon.png
